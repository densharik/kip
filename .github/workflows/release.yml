name: Release

# Every push to main is a release: no version numbers, the build id is the
# commit. The in-app updater compares its embedded commit against the latest
# release and updates when they differ.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  KIP_BUILD: build-${{ github.sha }}

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release
      - run: cargo build --release
      - name: Stage artifact
        shell: bash
        run: |
          mkdir dist
          cp target/release/kip.exe dist/kip.exe
      - uses: actions/upload-artifact@v4
        with:
          name: kip-windows
          path: dist/kip.exe

  macos:
    # macos-latest is Apple Silicon, so this builds arm64 natively in one pass.
    # Intel Macs run it through Rosetta 2.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release
      - name: Build (Apple Silicon)
        run: |
          cargo build --release
          mkdir -p dist
          cp target/release/kip dist/kip
      - name: Bundle kip.app
        run: |
          APP=dist/kip.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp dist/kip "$APP/Contents/MacOS/kip"
          chmod +x "$APP/Contents/MacOS/kip"
          cp resources/kip-ctx-hook.sh "$APP/Contents/Resources/"
          cp resources/icon.icns "$APP/Contents/Resources/kip.icns"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>kip</string>
            <key>CFBundleDisplayName</key><string>kip</string>
            <key>CFBundleIdentifier</key><string>com.densharik.kip</string>
            <key>CFBundleVersion</key><string>0.1.2</string>
            <key>CFBundleShortVersionString</key><string>0.1.2</string>
            <key>CFBundleExecutable</key><string>kip</string>
            <key>CFBundleIconFile</key><string>kip</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          codesign --force --deep -s - "$APP"
      - name: Zip (for the in-app updater and manual install)
        run: ditto -c -k --keepParent dist/kip.app dist/kip-macos.zip
      - name: Build .pkg installer
        run: |
          mkdir -p pkgroot pkgscripts
          cp -R dist/kip.app pkgroot/
          # Hand the installed app to the logged-in user so in-app updates can
          # replace it in place, without a password on every update.
          cat > pkgscripts/postinstall <<'SH'
          #!/bin/sh
          u="${INSTALL_PKG_SESSION_OWNER:-$(/usr/bin/stat -f%Su /dev/console)}"
          if [ -n "$u" ] && [ "$u" != "root" ] && [ "$u" != "loginwindow" ]; then
            /usr/sbin/chown -R "$u:staff" "/Applications/kip.app"
          fi
          exit 0
          SH
          chmod +x pkgscripts/postinstall
          pkgbuild --root pkgroot \
            --identifier com.densharik.kip \
            --version "$(echo ${GITHUB_SHA} | cut -c1-7)" \
            --scripts pkgscripts \
            --install-location /Applications \
            dist/kip-installer.pkg
      - uses: actions/upload-artifact@v4
        with:
          name: kip-macos
          path: |
            dist/kip-macos.zip
            dist/kip-installer.pkg

  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: build-${{ github.sha }}
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/kip-windows/kip.exe
            artifacts/kip-macos/kip-macos.zip
            artifacts/kip-macos/kip-installer.pkg
          generate_release_notes: true
