name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Stage artifact
        shell: bash
        run: |
          mkdir dist
          cp target/release/rwarp.exe dist/rwarp.exe
      - uses: actions/upload-artifact@v4
        with:
          name: rwarp-windows-x64
          path: dist/rwarp.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build universal binary
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p dist
          lipo -create -output dist/rwarp \
            target/x86_64-apple-darwin/release/rwarp \
            target/aarch64-apple-darwin/release/rwarp
      - name: Bundle rwarp.app
        run: |
          APP=dist/rwarp.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp dist/rwarp "$APP/Contents/MacOS/rwarp"
          chmod +x "$APP/Contents/MacOS/rwarp"
          cp resources/rwarp-ctx-hook.sh "$APP/Contents/Resources/"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>rwarp</string>
            <key>CFBundleDisplayName</key><string>rwarp</string>
            <key>CFBundleIdentifier</key><string>com.densharik.rwarp</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>CFBundleShortVersionString</key><string>0.1.0</string>
            <key>CFBundleExecutable</key><string>rwarp</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          codesign --force --deep -s - "$APP"
          ditto -c -k --keepParent "$APP" dist/rwarp-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: rwarp-macos
          path: dist/rwarp-macos.zip

  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/rwarp-windows-x64/rwarp.exe
            artifacts/rwarp-macos/rwarp-macos.zip
          generate_release_notes: true
